packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  protobufjs: true

minimumReleaseAgeExclude:
  - '@turbo/darwin-64'
  - '@turbo/darwin-arm64'
  - '@turbo/linux-64'
  - '@turbo/linux-arm64'
  - '@turbo/windows-64'
  - '@turbo/windows-arm64'
  - 'turbo'
